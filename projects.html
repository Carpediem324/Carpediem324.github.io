<!doctype html>
<html lang="ko" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title data-i18n-ko="Hyeonhak Shin | Projects" data-i18n-en="Hyeonhak Shin | Projects">
      Hyeonhak Shin | Projects
    </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 antialiased transition-colors duration-300 dark:bg-slate-950 dark:text-slate-50">
    <div class="mx-auto max-w-6xl px-6 py-6 md:px-8">
      <div id="siteHeader" data-site-header data-page="projects"></div>

      <main class="mt-12 pb-24">
        <section class="max-w-3xl">
          <p class="text-sm font-bold text-teal-700 dark:text-teal-200">Selected Work</p>
          <h1 class="mt-3 text-3xl font-bold md:text-5xl">
            <span data-i18n data-i18n-ko="프로젝트" data-i18n-en="Projects">프로젝트</span>
          </h1>
          <p class="mt-4 text-base leading-8 text-slate-600 dark:text-slate-300" data-i18n data-i18n-ko="CV 기반 프로젝트를 문제 정의, 역할, 기간, 성과가 보이도록 정리했습니다. 이미지는 assets/images/projects 폴더에 파일명을 맞춰 넣으면 자동으로 표시됩니다." data-i18n-en="Projects are organized from the CV around problem framing, role, period, and outcomes. Add matching image files under assets/images/projects to display them automatically.">
            CV 기반 프로젝트를 문제 정의, 역할, 기간, 성과가 보이도록 정리했습니다. 이미지는 assets/images/projects 폴더에 파일명을 맞춰 넣으면 자동으로 표시됩니다.
          </p>
        </section>

        <section id="projectsContainer" class="mt-5 grid gap-6 md:grid-cols-2"></section>
      </main>
    </div>

    <script src="assets/js/app.js" charset="UTF-8"></script>
  </body>
</html>
