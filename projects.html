<!doctype html>
<html lang="ko" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title data-i18n-ko="신현학 포트폴리오 | 프로젝트" data-i18n-en="Hyeonhak Shin Portfolio | Projects">
      신현학 포트폴리오 | 프로젝트
    </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 antialiased transition-colors duration-300 dark:bg-slate-950 dark:text-slate-50">
    <div class="mx-auto max-w-6xl px-6 py-6 md:px-8">
      <div id="siteHeader" data-site-header data-page="projects"></div>

      <main class="mt-12 pb-24">
        <section class="max-w-3xl">
          <p class="text-sm font-bold text-teal-700 dark:text-teal-200">Selected Work</p>
          <h1 class="mt-3 text-3xl font-bold md:text-5xl">
            <span data-i18n data-i18n-ko="프로젝트" data-i18n-en="Projects">프로젝트</span>
          </h1>
          <p class="mt-4 text-base leading-8 text-slate-600 dark:text-slate-300" data-i18n data-i18n-ko="문제 정의, 해결 전략, 결과가 보이도록 구성했습니다. GitHub Pages에 맞게 정적 프로젝트 목록으로 안정적으로 표시합니다." data-i18n-en="Organized around problem framing, solution strategy, and outcomes. Projects are rendered as a stable static list for GitHub Pages.">
            문제 정의, 해결 전략, 결과가 보이도록 구성했습니다. GitHub Pages에 맞게 정적 프로젝트 목록으로 안정적으로 표시합니다.
          </p>
        </section>

        <section id="projectsContainer" class="mt-5 grid gap-6 md:grid-cols-2"></section>
      </main>
    </div>

    <script src="assets/js/app.js" charset="UTF-8"></script>
  </body>
</html>
