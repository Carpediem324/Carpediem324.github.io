<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Robotics software portfolio for Hyeonhak Shin, covering autonomous driving, SLAM, ROS, and robot control projects."
    />
    <title>Hyeonhak Shin | Robotics Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const isLocalDev =
        ["localhost", "127.0.0.1"].includes(window.location.hostname) && window.location.port === "5173";

      if (!isLocalDev) {
        const styles = document.createElement("link");
        styles.rel = "stylesheet";
        styles.href = "/assets/app.css";
        document.head.appendChild(styles);
      }

      const app = document.createElement("script");
      app.type = "module";
      app.src = isLocalDev ? "/src/main.jsx" : "/assets/app.js";
      document.body.appendChild(app);
    </script>
  </body>
</html>
