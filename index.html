<!doctype html>
<html lang="ko" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carpediem Portfolio · Main</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: [
                "-apple-system",
                "BlinkMacSystemFont",
                "SF Pro Display",
                "Segoe UI",
                "Roboto",
                "Helvetica Neue",
                "Arial",
                "sans-serif",
              ],
            },
            boxShadow: {
              soft: "0 24px 64px -24px rgba(15, 23, 42, 0.3)",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800 antialiased transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100">
    <div class="mx-auto max-w-6xl px-6 py-6 md:px-8">
      <header class="flex items-center justify-between">
        <a href="index.html" class="text-sm font-semibold tracking-[0.2em] text-slate-500 dark:text-slate-400">CARPEDIEM</a>
        <button id="themeButton" class="rounded-full border border-slate-300 px-4 py-2 text-sm font-medium transition hover:bg-slate-100 dark:border-slate-700 dark:hover:bg-slate-800">다크 모드</button>
      </header>

      <main class="mt-16 grid items-center gap-10 lg:grid-cols-[1.2fr,1fr]">
        <section>
          <p class="inline-flex rounded-full border border-slate-200 bg-white px-3 py-1 text-xs font-medium text-slate-600 shadow-sm dark:border-slate-700 dark:bg-slate-900 dark:text-slate-300">고도화된 포트폴리오 웹사이트</p>
          <h1 class="mt-5 text-4xl font-semibold leading-tight md:text-6xl">신뢰감을 주는
            <span class="bg-gradient-to-r from-slate-900 via-slate-600 to-slate-900 bg-clip-text text-transparent dark:from-slate-100 dark:via-slate-300 dark:to-slate-100">현업형 포트폴리오</span>
          </h1>
          <p class="mt-6 max-w-xl text-base leading-relaxed text-slate-600 dark:text-slate-300">프로필과 프로젝트를 빠르게 탐색할 수 있도록 정보 구조를 단순화하고, 타이포그래피/여백/대비를 정교하게 다듬었습니다.</p>

          <div class="mt-8 flex flex-wrap gap-3">
            <a href="profile.html" class="rounded-full bg-slate-900 px-6 py-3 text-sm font-medium text-white transition hover:bg-slate-700 dark:bg-white dark:text-slate-900 dark:hover:bg-slate-200">개인정보 페이지</a>
            <a href="projects.html" class="rounded-full border border-slate-300 bg-white px-6 py-3 text-sm font-medium text-slate-700 transition hover:border-slate-400 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-200">프로젝트 페이지</a>
          </div>
        </section>

        <section class="rounded-3xl border border-slate-200 bg-white p-6 shadow-soft transition dark:border-slate-800 dark:bg-slate-900 md:p-8">
          <h2 class="text-xl font-semibold">탐색 흐름</h2>
          <ol class="mt-5 space-y-4 text-sm text-slate-600 dark:text-slate-300">
            <li class="rounded-2xl bg-slate-100 p-4 dark:bg-slate-800/70"><span class="font-semibold">1.</span> 개인정보 페이지에서 강점과 경력을 확인합니다.</li>
            <li class="rounded-2xl bg-slate-100 p-4 dark:bg-slate-800/70"><span class="font-semibold">2.</span> 프로젝트 페이지에서 대표 프로젝트를 선택합니다.</li>
            <li class="rounded-2xl bg-slate-100 p-4 dark:bg-slate-800/70"><span class="font-semibold">3.</span> 상세 페이지에서 문제 해결 과정과 성과를 검토합니다.</li>
          </ol>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
