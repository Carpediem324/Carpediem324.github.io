<!doctype html>
<html lang="ko" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carpediem Portfolio · 개인정보</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800 antialiased transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100">
    <div class="mx-auto max-w-5xl px-6 py-6 md:px-8">
      <header class="flex items-center justify-between">
        <a href="index.html" class="text-sm font-semibold tracking-[0.2em] text-slate-500 dark:text-slate-400">CARPEDIEM</a>
        <div class="flex gap-2">
          <a href="projects.html" class="rounded-full border border-slate-300 px-4 py-2 text-sm dark:border-slate-700">프로젝트</a>
          <button id="themeButton" class="rounded-full border border-slate-300 px-4 py-2 text-sm dark:border-slate-700">다크 모드</button>
        </div>
      </header>

      <main class="mt-12">
        <h1 class="text-3xl font-semibold md:text-5xl">개인정보</h1>
        <p class="mt-4 text-slate-600 dark:text-slate-300">제품 중심의 사고와 데이터 기반 실행을 강점으로 하는 웹 개발자입니다.</p>

        <section class="mt-10 grid gap-5 md:grid-cols-2">
          <article class="rounded-3xl border border-slate-200 bg-white p-6 dark:border-slate-800 dark:bg-slate-900">
            <h2 class="text-lg font-semibold">핵심 역량</h2>
            <ul class="mt-4 space-y-2 text-sm text-slate-600 dark:text-slate-300">
              <li>• 접근성과 성능을 고려한 프론트엔드 설계</li>
              <li>• 반응형 UI/UX 구현 및 디자인 시스템 운영</li>
              <li>• 협업 중심의 코드 리뷰/문서화 문화 정착</li>
            </ul>
          </article>
          <article class="rounded-3xl border border-slate-200 bg-white p-6 dark:border-slate-800 dark:bg-slate-900">
            <h2 class="text-lg font-semibold">경력 요약</h2>
            <ul class="mt-4 space-y-3 text-sm text-slate-600 dark:text-slate-300">
              <li><strong>Lead Frontend Engineer</strong><br />서비스 리디자인과 성능 개선 프로젝트 리드</li>
              <li><strong>Product-minded Developer</strong><br />비즈니스 KPI와 사용자 경험을 함께 개선</li>
            </ul>
          </article>
        </section>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
